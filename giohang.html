<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giỏ hàng - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        
        @layer base {
            html { font-size: 16px; }
            button, input, textarea { min-height: 52px; }
        }

        .cart-item {
            transition: all 0.3s ease;
        }
        .cart-item:hover {
            transform: translateY(-2px);
        }

        .sale-price {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f06292;
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-[#f06292] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 onclick="window.location.href='index.html'" class="heading-font text-2xl md:text-3xl font-semibold cursor-pointer">
                    THẾ GIỚI KIẾN TRÚC
                </h1>
            </div>

            <a href="sanpham.html" class="flex items-center gap-2 text-white hover:text-pink-100">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Tiếp tục mua sắm</span>
            </a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8 md:py-12">
        <h1 class="heading-font text-4xl md:text-5xl font-bold text-[#f06292] text-center mb-10">Giỏ hàng của bạn</h1>

        <div id="cartItems" class="space-y-6 mb-12"></div>

        <div class="bg-white rounded-3xl p-8 shadow-xl">
            <div class="flex justify-between items-center mb-10">
                <span class="text-2xl font-semibold">Tổng tiền:</span>
                <span id="totalPrice" class="text-3xl font-bold text-[#f06292]"></span>
            </div>

            <h2 class="text-2xl font-semibold mb-6">Thông tin đặt hàng</h2>
            
            <div class="space-y-5">
                <input id="customerName" type="text" placeholder="Họ và tên *" 
                       class="w-full px-6 py-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input id="customerPhone" type="tel" placeholder="Số điện thoại *" 
                           class="w-full px-6 py-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                    <input id="customerAddress" type="text" placeholder="Địa chỉ nhận hàng *" 
                           class="w-full px-6 py-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                </div>
                
                <textarea id="customerNote" rows="3" placeholder="Ghi chú thêm (tùy chọn)" 
                          class="w-full px-6 py-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none resize-y"></textarea>
            </div>

            <button onclick="placeOrder()" 
                    class="mt-10 w-full bg-[#f06292] hover:bg-[#ec407a] text-white py-6 rounded-3xl font-semibold text-xl transition active:scale-95">
                TIẾP TỤC THANH TOÁN
            </button>
        </div>
    </div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function renderCart() {
    const container = document.getElementById('cartItems');
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="text-center py-20 bg-white rounded-3xl shadow">
                <i class="fa-solid fa-shopping-cart text-7xl text-gray-200 mb-6"></i>
                <p class="text-gray-500 text-xl">Giỏ hàng của bạn đang trống</p>
                <a href="sanpham.html" class="mt-8 inline-block bg-[#f06292] text-white px-10 py-4 rounded-3xl font-medium">
                    Quay lại mua sắm
                </a>
            </div>`;
        document.getElementById('totalPrice').innerHTML = '0 ₫';
        return;
    }

    let html = '';
    cart.forEach((item, index) => {
        const itemTotal = Number(item.price) * (item.quantity || 1);
        total += itemTotal;

        const colorText = item.color ? `<span class="text-sm text-gray-500">• Màu: ${item.color}</span>` : '';

        html += `
            <div class="cart-item bg-white rounded-3xl p-6 flex flex-col sm:flex-row gap-6 shadow">
                <img src="${item.image}" 
                     class="w-full sm:w-32 h-32 object-cover rounded-2xl flex-shrink-0" 
                     alt="${item.name}">
                
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-lg leading-tight break-words">${item.name}</h3>
                    ${colorText}
                    <div class="mt-3">
                        <span class="sale-price">${Number(item.price).toLocaleString('vi-VN')} ₫</span>
                    </div>
                    
                    <div class="flex items-center gap-5 mt-6">
                        <div class="flex items-center border border-gray-300 rounded-3xl">
                            <button onclick="changeQuantity(${index}, -1)" 
                                    class="w-11 h-11 text-xl font-medium hover:bg-gray-100 rounded-l-3xl">-</button>
                            <span class="w-12 text-center font-medium">${item.quantity || 1}</span>
                            <button onclick="changeQuantity(${index}, 1)" 
                                    class="w-11 h-11 text-xl font-medium hover:bg-gray-100 rounded-r-3xl">+</button>
                        </div>
                        
                        <button onclick="removeItem(${index})" 
                                class="ml-auto text-red-500 hover:text-red-600 flex items-center gap-2 text-sm">
                            <i class="fa-solid fa-trash"></i> Xóa
                        </button>
                    </div>
                </div>

                <div class="text-right font-semibold text-lg self-end sm:self-center">
                    ${itemTotal.toLocaleString('vi-VN')} ₫
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
    document.getElementById('totalPrice').innerHTML = `
        <span class="text-3xl font-bold">${total.toLocaleString('vi-VN')} ₫</span>
    `;
}

function changeQuantity(index, change) {
    if (!cart[index]) return;
    let qty = (cart[index].quantity || 1) + change;
    if (qty < 1) qty = 1;
    cart[index].quantity = qty;
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
}

function removeItem(index) {
    if (confirm("Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?")) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }
}

function placeOrder() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
        if (confirm("Bạn cần đăng nhập để đặt hàng. Chuyển đến trang đăng nhập ngay?")) {
            window.location.href = 'auth.html';
        }
        return;
    }

    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const address = document.getElementById('customerAddress').value.trim();
    const note = document.getElementById('customerNote').value.trim();

    if (!name || !phone || !address) {
        alert("Vui lòng nhập đầy đủ Họ tên, Số điện thoại và Địa chỉ!");
        return;
    }

    const orderData = {
        user_id: currentUser.id,
        customer_name: name,
        customer_phone: phone,
        customer_address: address,
        customer_note: note,
        items: cart,
        total: cart.reduce((sum, item) => sum + (Number(item.price) * (item.quantity || 1)), 0),
        status: 'pending',
        created_at: new Date().toISOString()
    };

    // Lưu tạm vào localStorage để chuyển sang trang thanh toán
    localStorage.setItem('currentOrder', JSON.stringify(orderData));
    
    // Xóa giỏ hàng sau khi đặt
    localStorage.removeItem('cart');
    
    window.location.href = 'thanhtoan.html';
}

// Khởi tạo
window.onload = () => {
    renderCart();

    // Tự động điền thông tin nếu đã đăng nhập
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) {
        document.getElementById('customerName').value = currentUser.name || '';
        document.getElementById('customerPhone').value = currentUser.phone || '';
    }
};
</script>
</body>
</html>
