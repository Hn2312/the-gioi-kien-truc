<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấp tài khoản nhân viên - Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
        <div class="text-center mb-10">
            <h1 class="heading-font text-4xl font-bold text-[#f06292]">Cấp Tài Khoản Nhân Viên</h1>
            <p class="text-gray-600 mt-2">Nhân viên sẽ dùng tài khoản này để thêm/sửa/xóa sản phẩm</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Họ và tên nhân viên</label>
                <input id="fullName" type="text" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" placeholder="Nguyễn Văn A">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập (Username)</label>
                <input id="username" type="text" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" placeholder="username">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
                <input id="password" type="password" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" placeholder="Ít nhất 6 ký tự">
            </div>

            <button onclick="createStaffAccount()" 
                    class="w-full bg-[#f06292] hover:bg-[#ec407a] text-white py-6 rounded-3xl font-semibold text-xl transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i>
                CẤP TÀI KHOẢN NHÂN VIÊN
            </button>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://bmtoaaajobrqgmjidtgf.supabase.co',
    'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'
);

async function createStaffAccount() {
    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value.trim();

    if (!fullName || !username || !password) {
        alert("❌ Vui lòng nhập đầy đủ thông tin!");
        return;
    }
    if (password.length < 6) {
        alert("❌ Mật khẩu phải có ít nhất 6 ký tự!");
        return;
    }

    try {
        // Kiểm tra username đã tồn tại chưa
        const { data: existing } = await supabaseClient
            .from('staff')
            .select('id')
            .eq('username', username)
            .limit(1);

        if (existing && existing.length > 0) {
            alert("❌ Tên đăng nhập này đã tồn tại! Vui lòng chọn tên khác.");
            return;
        }

        // Thêm vào bảng staff
        const { error } = await supabaseClient.from('staff').insert({
            username: username,
            password: password,
            full_name: fullName,
            role: 'staff',
            active: true
        });

        if (error) throw error;

        alert(`✅ Cấp tài khoản nhân viên thành công!\n\nHọ tên: ${fullName}\nUsername: ${username}\nMật khẩu: ${password}\n\nNhân viên có thể đăng nhập vào staff.html ngay.`);

        // Reset form
        document.getElementById('fullName').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';

    } catch (err) {
        console.error(err);
        alert("❌ Lỗi: " + err.message);
    }
}
</script>
</body>
</html>
