<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sản phẩm - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        
        @layer base {
            html { font-size: 16px; }
            button, input { min-height: 52px; }
        }

        .product-card { 
            transition: all 0.4s ease; 
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgb(240 98 146 / 0.15); 
        }

        .product-image-container {
            position: relative;
            overflow: hidden;
        }
        .product-img {
            width: 100%;
            height: 205px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .product-card:hover .product-img { transform: scale(1.08); }

        .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(240, 98, 146, 0.95);
            color: white;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 9999px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .sold-badge {
            background: linear-gradient(90deg, #fce7f3, #fdf2f8);
            color: #f06292;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .star { color: #facc15; }

        .category-wrapper { position: relative; }
        .category-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.15);
            min-width: 260px;
            z-index: 9999;
            padding: 8px 0;
            margin-top: 4px;
        }
        .category-dropdown.show { display: block; }
        .category-dropdown a {
            display: block;
            padding: 12px 24px;
            color: #374151;
            font-weight: 500;
        }
        .category-dropdown a:hover {
            background: #fce7f3;
            color: #f06292;
        }

        /* Pagination */
        .pagination-btn {
            transition: all 0.2s;
        }
        .pagination-btn.active {
            background-color: #f06292;
            color: white;
            border-color: #f06292;
        }
    </style>
</head>
<body class="bg-[#fce7f3]">

    <!-- NAVBAR -->
    <nav class="bg-[#f06292] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 onclick="window.location.href='index.html'" class="heading-font text-2xl md:text-3xl font-semibold cursor-pointer">
                    THẾ GIỚI KIẾN TRÚC
                </h1>
            </div>

            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-pink-100">Trang chủ</a>
                <a href="index.html#dichvu" class="hover:text-pink-100">Dịch vụ</a>
                <a href="index.html#vechungtoi" class="hover:text-pink-100">Về chúng tôi</a>
                <a href="sanpham.html" class="font-bold text-white">Sản phẩm</a>
                <a href="index.html#lienhe" class="hover:text-pink-100">Liên hệ</a>
            </div>

            <div class="flex items-center gap-5">
                <button onclick="goToCart()" class="relative text-white hover:text-pink-100">
                    <i class="fa-solid fa-shopping-cart text-2xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-white text-[#f06292] text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </button>
                <a href="lichsu.html" class="text-white hover:text-pink-100">
                    <i class="fa-solid fa-clock-rotate-left text-2xl"></i>
                </a>
                <button onclick="showNotifications()" class="relative text-white hover:text-pink-100">
                    <i class="fa-solid fa-bell text-2xl"></i>
                </button>
                <button onclick="handleAuthClick()" id="authButton" class="text-white hover:text-pink-100">
                    <i class="fa-solid fa-user text-2xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 id="pageTitle" class="heading-font text-4xl md:text-5xl font-bold text-[#f06292]">Tất cả sản phẩm</h1>
            
            <div class="category-wrapper">
                <button onclick="toggleCategoryDropdown()" 
                        class="flex items-center gap-3 bg-white text-[#f06292] px-6 py-3 rounded-3xl font-medium border border-pink-200 hover:border-[#f06292]">
                    <i class="fa-solid fa-list-ul"></i>
                    Danh mục
                    <i id="chevron" class="fa-solid fa-chevron-down transition-transform"></i>
                </button>
                <div id="categoryDropdown" class="category-dropdown"></div>
            </div>
        </div>

        <div class="mb-8">
            <input id="searchInput" onkeyup="if(event.key==='Enter') applyFilters()" 
                   placeholder="🔍 Tìm kiếm sản phẩm theo tên hoặc mã gp, gm..." 
                   class="w-full px-6 py-4 border border-pink-300 rounded-3xl focus:outline-none focus:border-[#f06292]">
        </div>

        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>

        <!-- Phân trang -->
        <div id="pagination" class="flex justify-center items-center gap-2 mt-12"></div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 max-w-xs"></div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'; 
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allCategories = [];
let currentCategoryName = null;
let currentSearch = '';
let currentPage = 1;
const PAGE_SIZE = 10;           // ← Đúng 10 sản phẩm mỗi trang như anh yêu cầu

let cart = JSON.parse(localStorage.getItem('cart')) || [];

// ==================== GIỎ HÀNG & AUTH ====================
function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cartCount');
    badge.textContent = count;
    badge.classList.toggle('hidden', count === 0);
}

function goToCart() { window.location.href = 'giohang.html'; }

function handleAuthClick() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) window.location.href = 'auth.html';
    else if (confirm("Bạn muốn đăng xuất?")) {
        localStorage.removeItem('currentUser');
        updateAuthButton();
        alert("Đã đăng xuất!");
    }
}

function updateAuthButton() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const btn = document.getElementById('authButton');
    btn.innerHTML = currentUser ? `<i class="fa-solid fa-right-from-bracket text-2xl"></i>` : `<i class="fa-solid fa-user text-2xl"></i>`;
}

function showNotifications() { alert("Hiện chưa có thông báo nào."); }

// ==================== DANH MỤC ====================
function toggleCategoryDropdown() {
    const dropdown = document.getElementById('categoryDropdown');
    const chevron = document.getElementById('chevron');
    dropdown.classList.toggle('show');
    chevron.classList.toggle('rotate-180');
}

function renderCategoryDropdown() {
    const dropdown = document.getElementById('categoryDropdown');
    let html = `<a onclick="selectCategory(null)" class="block px-6 py-3 hover:bg-[#fce7f3]">Tất cả sản phẩm</a>`;
    
    allCategories.forEach(cat => {
        html += `<a onclick="selectCategory('${cat.name}')" class="block px-6 py-3 hover:bg-[#fce7f3]">${cat.name}</a>`;
    });
    dropdown.innerHTML = html;
}

function selectCategory(name) {
    currentCategoryName = name;
    currentPage = 1;
    document.getElementById('categoryDropdown').classList.remove('show');
    document.getElementById('chevron').classList.remove('rotate-180');
    document.getElementById('pageTitle').textContent = name ? name : "Tất cả sản phẩm";
    applyFilters();
}

// ==================== PHÂN TRANG ====================
function renderPagination(total) {
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const container = document.getElementById('pagination');
    container.innerHTML = '';

    if (totalPages <= 1) return;

    // Previous
    const prevBtn = document.createElement('button');
    prevBtn.innerHTML = `<i class="fa-solid fa-chevron-left"></i>`;
    prevBtn.className = `pagination-btn px-4 py-3 border border-gray-300 rounded-2xl hover:bg-gray-100 ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}`;
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; applyFilters(); }};
    container.appendChild(prevBtn);

    // Số trang
    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `pagination-btn w-10 h-10 border border-gray-300 rounded-2xl hover:bg-gray-100 ${i === currentPage ? 'active' : ''}`;
        btn.onclick = () => { currentPage = i; applyFilters(); };
        container.appendChild(btn);
    }

    // Next
    const nextBtn = document.createElement('button');
    nextBtn.innerHTML = `<i class="fa-solid fa-chevron-right"></i>`;
    nextBtn.className = `pagination-btn px-4 py-3 border border-gray-300 rounded-2xl hover:bg-gray-100 ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}`;
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; applyFilters(); }};
    container.appendChild(nextBtn);
}

// ==================== LẤY DỮ LIỆU ====================
async function fetchProducts(page = 1, searchTerm = '', categoryName = null) {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">Đang tải sản phẩm...</p>`;

    const from = (page - 1) * PAGE_SIZE;
    const to = from + PAGE_SIZE - 1;

    let query = client.from('products').select('*', { count: 'exact' });

    if (categoryName) {
        query = query.eq('category', categoryName);
    }

    if (searchTerm) {
        query = query.or(`name.ilike.%${searchTerm}%,desc.ilike.%${searchTerm}%`);
    }

    query = query.order('created_at', { ascending: false }).range(from, to);

    const { data, error, count } = await query;

    if (error) {
        console.error(error);
        grid.innerHTML = `<p class="col-span-full text-center py-20 text-red-500">Lỗi tải sản phẩm</p>`;
        return;
    }

    renderProducts(data || []);
    renderPagination(count || 0);
}

function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (products.length === 0) {
        grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">Không tìm thấy sản phẩm nào.</p>`;
        return;
    }

    grid.innerHTML = products.map(p => {
        const images = Array.isArray(p.images) && p.images.length ? p.images : [p.image || 'https://via.placeholder.com/300?text=No+Image'];
        const firstImage = images[0];

        const sold = Math.floor(Math.random() * 135) + 18;
        const rating = (4.4 + Math.random() * 0.6).toFixed(1);
        const reviewCount = Math.floor(Math.random() * 45) + 8;

        let priceHTML = p.price_to && p.price_to > p.price 
            ? `<div class="text-[#f06292] font-bold text-lg">Từ ${Number(p.price).toLocaleString('vi-VN')} - ${Number(p.price_to).toLocaleString('vi-VN')} ₫</div>`
            : `<div class="text-[#f06292] font-bold text-lg">${Number(p.price).toLocaleString('vi-VN')} ₫</div>`;

        return `
            <div class="product-card bg-white rounded-2xl overflow-hidden shadow cursor-pointer h-full flex flex-col" onclick="showProductDetail('${p.id}')">
                <div class="product-image-container">
                    <img src="${firstImage}" class="product-img" alt="${p.name}">
                    ${p.category ? `<div class="category-badge">${p.category}</div>` : ''}
                </div>
                <div class="p-5 flex-1 flex flex-col">
                    <h3 class="font-semibold text-base line-clamp-2 flex-1">${p.name}</h3>
                    ${priceHTML}
                    <div class="flex items-center justify-between mt-4 text-sm">
                        <div class="flex items-center gap-1">
                            <span class="text-yellow-400 text-xl">★</span>
                            <span class="font-medium">${rating}</span>
                            <span class="text-gray-500 text-xs">(${reviewCount} đánh giá)</span>
                        </div>
                        <div class="sold-badge hidden md:flex">
                            <i class="fa-solid fa-fire text-sm"></i> Đã bán ${sold}
                        </div>
                    </div>

                    <div class="mt-auto pt-6 flex gap-3">
                        <button onclick="event.stopImmediatePropagation(); showProductDetail('${p.id}')" 
                                class="flex-1 bg-[#f06292] hover:bg-[#ec407a] text-white py-3 rounded-2xl text-sm font-medium">
                            Xem chi tiết
                        </button>
                        <button onclick="event.stopImmediatePropagation(); addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${firstImage}')" 
                                class="flex-1 border border-[#f06292] hover:bg-pink-50 text-[#f06292] py-3 rounded-2xl text-sm font-medium">
                            Thêm giỏ
                        </button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function showProductDetail(id) {
    window.location.href = `chitiet.html?id=${id}`;
}

function addToCart(id, name, price, image) {
    const existing = cart.find(item => item.id === id);
    if (existing) existing.quantity += 1;
    else cart.push({ id, name, price, image, quantity: 1 });

    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert(`${name} đã được thêm vào giỏ hàng!`);
}

// ==================== ÁP DỤNG LỌC ====================
async function applyFilters() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
    await fetchProducts(currentPage, currentSearch, currentCategoryName);
}

// ==================== LOAD DỮ LIỆU + ĐỌC CATEGORY TỪ URL ====================
async function loadData() {
    try {
        // Lấy danh sách categories
        const { data: categories } = await client.from('categories').select('name').order('name');
        allCategories = categories || [];
        renderCategoryDropdown();

        // Đọc category từ URL (từ trang index chuyển sang)
        const urlParams = new URLSearchParams(window.location.search);
        const categoryFromUrl = urlParams.get('category');

        if (categoryFromUrl) {
            currentCategoryName = categoryFromUrl;
            document.getElementById('pageTitle').textContent = categoryFromUrl;
        } else {
            document.getElementById('pageTitle').textContent = "Tất cả sản phẩm";
        }

        // Load sản phẩm trang đầu tiên
        await fetchProducts(1, '', currentCategoryName);

    } catch (e) {
        console.error(e);
        document.getElementById('productsGrid').innerHTML = `<p class="col-span-full text-center py-20 text-red-500">Không thể tải dữ liệu</p>`;
    }
}

// Khởi tạo
window.onload = () => {
    loadData();
    updateCartCount();
    updateAuthButton();
};
</script>
</body>
</html>
