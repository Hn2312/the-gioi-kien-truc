<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý khách hàng - Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        /* Tối ưu mobile */
        @layer base {
            html { font-size: 16px; }
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="heading-font text-4xl font-bold">👥 Quản lý khách hàng</h1>
        <a href="admin.html" class="bg-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-gray-100 text-sm md:text-base">
            ← Quay lại Admin
        </a>
    </div>

    <div id="customerList" class="space-y-4"></div>
</div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadCustomers() {
    const container = document.getElementById('customerList');
    container.innerHTML = '<p class="text-center py-12 text-gray-500">Đang tải danh sách khách hàng...</p>';

    const { data, error } = await supabaseClient.from('users').select('*').order('created_at', { ascending: false });

    if (error) {
        container.innerHTML = `<p class="text-red-500 text-center py-12">Lỗi tải dữ liệu: ${error.message}</p>`;
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-center py-12 text-gray-500">Chưa có khách hàng nào.</p>';
        return;
    }

    let html = '';
    data.forEach(user => {
        html += `
            <div class="bg-white border border-pink-100 rounded-3xl p-6 flex flex-col sm:flex-row justify-between gap-4">
                <div class="flex-1">
                    <p class="font-semibold text-lg">${user.name}</p>
                    <p class="text-gray-600">${user.email}</p>
                    <p class="text-gray-500 text-sm">SĐT: ${user.phone || 'Chưa cập nhật'}</p>
                </div>
                <div class="text-right text-sm text-gray-400 self-center">
                    <p>Đăng ký: ${new Date(user.created_at).toLocaleString('vi-VN')}</p>
                </div>
            </div>`;
    });

    container.innerHTML = html;
}

window.onload = loadCustomers;
</script>
</body>
</html>
