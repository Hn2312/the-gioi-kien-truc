<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập Nhân viên - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-3xl shadow-2xl p-10">
            <div class="text-center mb-8">
                <h1 class="heading-font text-4xl font-bold text-[#f06292]">Nhân viên</h1>
                <p class="text-gray-600 mt-2">Đăng nhập để quản lý sản phẩm</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập</label>
                    <input id="username" type="text" 
                           class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" 
                           placeholder="username">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
                    <input id="password" type="password" 
                           class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" 
                           placeholder="••••••••">
                </div>

                <button onclick="staffLogin()" 
                        class="w-full bg-[#f06292] hover:bg-[#ec407a] text-white py-6 rounded-3xl font-semibold text-xl transition">
                    ĐĂNG NHẬP
                </button>

                <div class="text-center text-sm text-gray-500">
                    <a href="admin-login.html" class="hover:text-[#f06292]">← Đăng nhập Admin</a>
                </div>
            </div>
        </div>
    </div>

<script>
// ==================== SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://bmtoaaajobrqgmjidtgf.supabase.co',
    'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'
);

async function staffLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
        alert("Vui lòng nhập username và mật khẩu!");
        return;
    }

    try {
        const { data, error } = await supabaseClient
            .from('staff')
            .select('*')
            .eq('username', username)
            .eq('password', password)
            .eq('active', true)
            .single();

        if (error || !data) {
            alert("❌ Sai tên đăng nhập hoặc mật khẩu!");
            return;
        }

        // Lưu thông tin đăng nhập
        localStorage.setItem('currentStaff', JSON.stringify({
            id: data.id,
            username: data.username,
            full_name: data.full_name,
            role: 'staff'
        }));

        alert(`✅ Đăng nhập thành công!\nChào ${data.full_name}`);
        window.location.href = 'staff.html';

    } catch (err) {
        console.error(err);
        alert("❌ Lỗi hệ thống. Vui lòng thử lại sau.");
    }
}

// Nhấn Enter để đăng nhập
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') staffLogin();
});
</script>
</body>
</html>
