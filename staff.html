<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhân viên - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        
        @layer base {
            html { font-size: 16px; }
            input, select, button, textarea { min-height: 52px; }
        }
        
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }
        .preview-item {
            position: relative;
        }
        .preview-item img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 16px;
        }
        .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #ef4444;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

<!-- KIỂM TRA ĐĂNG NHẬP NHÂN VIÊN -->
<script>
    const currentStaff = JSON.parse(localStorage.getItem('currentStaff'));
    if (!currentStaff || currentStaff.role !== 'staff') {
        alert("Bạn chưa đăng nhập với quyền Nhân viên.");
        window.location.href = 'staff-login.html';   // ← Sửa thành staff-login.html
    }
</script>

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-[#f06292] text-white p-6 flex justify-between items-center">
            <div>
                <h1 class="heading-font text-3xl font-bold">Nhân viên Panel</h1>
                <p class="text-pink-100">Quản lý sản phẩm - THẾ GIỚI KIẾN TRÚC</p>
            </div>
            <button onclick="logout()" 
                    class="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-5 py-3 rounded-2xl transition">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Đăng xuất</span>
            </button>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 id="formTitle" class="text-2xl font-semibold text-gray-800">➕ Thêm sản phẩm mới</h2>
                <button onclick="resetForm()" 
                        class="px-6 py-3 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium">
                    Làm mới form
                </button>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                
                <!-- Form -->
                <div class="space-y-6">
                    <input id="name" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" placeholder="Tên sản phẩm *">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Giá (VNĐ) <span class="text-red-500">*</span></label>
                            <input id="price" type="number" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Giá đến (tùy chọn)</label>
                            <input id="price_to" type="number" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Danh mục <span class="text-red-500">*</span></label>
                        <select id="categorySelect" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none">
                            <option value="">Đang tải danh mục...</option>
                        </select>
                    </div>

                    <textarea id="desc" rows="4" class="w-full p-4 border border-pink-200 rounded-3xl focus:border-[#f06292] outline-none" placeholder="Mô tả sản phẩm..."></textarea>

                    <!-- Ảnh sản phẩm -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ảnh sản phẩm (chọn nhiều)</label>
                        <input id="imageFiles" type="file" accept="image/*" multiple class="hidden">
                        <div id="previewArea" onclick="document.getElementById('imageFiles').click()" 
                             class="border-2 border-dashed border-pink-300 rounded-3xl p-10 text-center cursor-pointer hover:border-[#f06292]">
                            <i class="fa-solid fa-cloud-arrow-up text-6xl text-pink-400 mb-4"></i>
                            <p class="font-medium">Click để chọn ảnh</p>
                        </div>
                        <div id="imagePreviewGrid" class="image-preview-grid mt-4"></div>
                    </div>

                    <button onclick="saveProduct()" id="saveBtn"
                            class="w-full bg-[#f06292] text-white py-6 rounded-3xl font-semibold text-xl hover:bg-[#ec407a]">
                        + THÊM SẢN PHẨM
                    </button>
                </div>

                <!-- Danh sách sản phẩm -->
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-semibold">📋 Danh sách sản phẩm</h2>
                        <button onclick="loadProducts()" class="text-pink-600 hover:text-pink-700">
                            <i class="fa-solid fa-rotate"></i> Làm mới
                        </button>
                    </div>
                    <div id="productList" class="space-y-4 max-h-[620px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://bmtoaaajobrqgmjidtgf.supabase.co',
    'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'
);

let editingProductId = null;
let selectedFiles = [];

// Đăng xuất
function logout() {
    if (confirm("Đăng xuất khỏi tài khoản nhân viên?")) {
        localStorage.removeItem('currentStaff');
        window.location.href = 'admin-login.html';
    }
}

// Load danh mục
async function loadCategories() {
    const select = document.getElementById('categorySelect');
    const { data } = await supabaseClient.from('categories').select('id, name').order('name');
    
    select.innerHTML = '<option value="">Chọn danh mục...</option>';
    data.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.id;
        opt.textContent = cat.name;
        select.appendChild(opt);
    });
}

// Xử lý ảnh
document.getElementById('imageFiles').addEventListener('change', e => {
    selectedFiles = Array.from(e.target.files);
    renderPreviews();
});

function renderPreviews() {
    const grid = document.getElementById('imagePreviewGrid');
    grid.innerHTML = '';
    selectedFiles.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = ev => {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
                <img src="${ev.target.result}">
                <div onclick="removeImage(${i}); event.stopImmediatePropagation()" class="remove-btn">×</div>
            `;
            grid.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
}

function removeImage(index) {
    selectedFiles.splice(index, 1);
    renderPreviews();
}

// Load danh sách sản phẩm
async function loadProducts() {
    const container = document.getElementById('productList');
    container.innerHTML = '<p class="text-center py-12 text-gray-500">Đang tải sản phẩm...</p>';

    const { data, error } = await supabaseClient
        .from('products')
        .select('*')
        .order('created_at', { ascending: false });

    if (error || !data || data.length === 0) {
        container.innerHTML = '<p class="text-center py-12 text-gray-500">Chưa có sản phẩm nào.</p>';
        return;
    }

    let html = '';
    data.forEach(p => {
        const firstImg = Array.isArray(p.images) && p.images.length ? p.images[0] : 'https://via.placeholder.com/300?text=No+Image';
        const priceDisplay = p.price_to 
            ? `Từ ${Number(p.price).toLocaleString('vi-VN')} - ${Number(p.price_to).toLocaleString('vi-VN')} ₫`
            : `${Number(p.price).toLocaleString('vi-VN')} ₫`;

        html += `
            <div class="bg-white border border-pink-100 rounded-3xl p-5 flex flex-col sm:flex-row gap-4">
                <img src="${firstImg}" class="w-full sm:w-28 h-40 sm:h-28 object-cover rounded-2xl" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                <div class="flex-1">
                    <h3 class="font-semibold text-lg">${p.name}</h3>
                    <p class="text-[#f06292] font-bold mt-1">${priceDisplay}</p>
                    <p class="text-sm text-gray-500">${p.category || 'Chưa phân loại'}</p>
                    
                    <div class="flex gap-3 mt-6">
                        <button onclick="editProduct('${p.id}')" 
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl text-sm">✏️ Sửa</button>
                        <button onclick="deleteProduct('${p.id}')" 
                                class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-2xl text-sm">🗑 Xóa</button>
                    </div>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// Xóa sản phẩm
async function deleteProduct(id) {
    if (!confirm("Bạn có chắc muốn xóa sản phẩm này?")) return;
    
    const { error } = await supabaseClient.from('products').delete().eq('id', id);
    if (error) {
        alert("Lỗi khi xóa: " + error.message);
        return;
    }
    alert("✅ Đã xóa sản phẩm!");
    loadProducts();
}

// Sửa sản phẩm
async function editProduct(id) {
    editingProductId = id;
    const { data: p } = await supabaseClient.from('products').select('*').eq('id', id).single();

    document.getElementById('name').value = p.name || '';
    document.getElementById('price').value = p.price || '';
    document.getElementById('price_to').value = p.price_to || '';
    document.getElementById('desc').value = p.desc || '';
    if (p.category_id) document.getElementById('categorySelect').value = p.category_id;

    selectedFiles = [];
    document.getElementById('imageFiles').value = '';
    document.getElementById('imagePreviewGrid').innerHTML = '';

    // Preview ảnh cũ
    const images = Array.isArray(p.images) ? p.images : [];
    const grid = document.getElementById('imagePreviewGrid');
    images.forEach(url => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `<img src="${url}">`;
        grid.appendChild(div);
    });

    document.getElementById('formTitle').textContent = '✏️ Sửa sản phẩm';
    document.getElementById('saveBtn').textContent = '💾 CẬP NHẬT SẢN PHẨM';
    document.getElementById('saveBtn').onclick = updateProduct;
}

// Lưu / Cập nhật sản phẩm
async function saveProduct() {
    const isUpdate = !!editingProductId;
    const btn = document.getElementById('saveBtn');
    const originalText = btn.textContent;
    btn.textContent = isUpdate ? 'Đang cập nhật...' : 'Đang thêm...';
    btn.disabled = true;

    const name = document.getElementById('name').value.trim();
    const price = parseFloat(document.getElementById('price').value);
    const price_to = parseFloat(document.getElementById('price_to').value) || null;
    const category_id = document.getElementById('categorySelect').value;
    const desc = document.getElementById('desc').value.trim();

    if (!name || !price || !category_id || (selectedFiles.length === 0 && !isUpdate)) {
        alert("Vui lòng nhập đầy đủ thông tin và chọn ít nhất 1 ảnh!");
        btn.textContent = originalText;
        btn.disabled = false;
        return;
    }

    try {
        let imageUrls = [];
        if (selectedFiles.length > 0) {
            const uploadPromises = selectedFiles.map(async file => {
                const fileName = `${Date.now()}-${file.name}`;
                await supabaseClient.storage.from('products').upload(fileName, file);
                const { data } = supabaseClient.storage.from('products').getPublicUrl(fileName);
                return data.publicUrl;
            });
            imageUrls = await Promise.all(uploadPromises);
        }

        const { data: cat } = await supabaseClient.from('categories').select('name').eq('id', category_id).single();
        const categoryName = cat ? cat.name : '';

        const productData = {
            name,
            price,
            price_to,
            category_id: parseInt(category_id),
            category: categoryName,
            desc: desc || "Đang cập nhật...",
        };

        if (imageUrls.length > 0) productData.images = imageUrls;

        if (isUpdate) {
            await supabaseClient.from('products').update(productData).eq('id', editingProductId);
            alert("✅ Cập nhật sản phẩm thành công!");
        } else {
            await supabaseClient.from('products').insert(productData);
            alert("✅ Thêm sản phẩm thành công!");
        }

        resetForm();
        loadProducts();
    } catch (err) {
        console.error(err);
        alert("❌ Lỗi: " + err.message);
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

async function updateProduct() {
    await saveProduct();
}

function resetForm() {
    editingProductId = null;
    selectedFiles = [];
    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('price_to').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('categorySelect').value = '';
    document.getElementById('imageFiles').value = '';
    document.getElementById('imagePreviewGrid').innerHTML = '';
    
    document.getElementById('formTitle').textContent = '➕ Thêm sản phẩm mới';
    document.getElementById('saveBtn').textContent = '+ THÊM SẢN PHẨM';
    document.getElementById('saveBtn').onclick = saveProduct;
}

// Khởi tạo
window.onload = async () => {
    await loadCategories();
    loadProducts();
};
</script>
</body>
</html>
