<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý đơn hàng - Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        .order-card {
            transition: all 0.3s ease;
        }
        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(240 98 146 / 0.15);
        }

        .color-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 8px;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        @layer base {
            html { font-size: 16px; }
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-10">
        <h1 class="heading-font text-4xl font-bold text-gray-800">📋 Quản lý đơn hàng</h1>
        <a href="admin.html" class="bg-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-gray-100">
            ← Quay lại Admin
        </a>
    </div>

    <div id="orderList" class="space-y-6"></div>
</div>

<!-- MODAL XEM HÓA ĐƠN -->
<div id="invoiceModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
    <div class="bg-white rounded-3xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-auto">
        <div class="sticky top-0 bg-white border-b px-8 py-4 flex justify-between items-center z-10">
            <h2 class="heading-font text-3xl text-[#f06292]">HÓA ĐƠN BÁN HÀNG</h2>
            <div class="flex gap-3">
                <button onclick="printInvoice()" 
                        class="flex items-center gap-2 bg-[#f06292] text-white px-6 py-2 rounded-2xl hover:bg-[#ec407a]">
                    <i class="fa-solid fa-print"></i> In hóa đơn
                </button>
                <button onclick="closeInvoiceModal()" 
                        class="text-gray-500 hover:text-gray-700 text-2xl">✕</button>
            </div>
        </div>

        <div id="invoiceContent" class="p-8"></div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const paymentConfig = {
    cod:      { icon: 'fa-hand-holding-dollar', text: 'Thanh toán khi nhận hàng' },
    bank:     { icon: 'fa-building-columns',    text: 'Chuyển khoản ACB' },
    zalopay:  { icon: 'fa-qrcode',              text: 'ZaloPay' },
    momo:     { icon: 'fa-qrcode',              text: 'MoMo' }
};

let currentOrderForPrint = null;

// Helper lấy màu hex
function getColorHex(colorName) {
    const map = {
        "Trắng": "#f8fafc",
        "Đen": "#1f2937",
        "Vân gỗ óc chó": "#5c4033",
        "Vân gỗ nâu": "#8d5524",
        "Xám": "#64748b",
        "Be": "#d2b48c"
    };
    return map[colorName] || "#e5e7eb";
}

// ==================== TẢI DANH SÁCH ĐƠN HÀNG ====================
async function loadOrders() {
    const container = document.getElementById('orderList');
    container.innerHTML = '<p class="text-center py-12 text-gray-500">Đang tải đơn hàng...</p>';

    const { data, error } = await supabaseClient
        .from('orders')
        .select(`*, users(name, phone)`)
        .order('created_at', { ascending: false });

    if (error || !data) {
        container.innerHTML = `<p class="text-red-500 text-center py-12">Lỗi tải dữ liệu</p>`;
        console.error(error);
        return;
    }

    let html = '';
    data.forEach(order => {
        const pay = paymentConfig[order.payment_method] || { icon: 'fa-question', text: order.payment_method || 'Không rõ' };

        // Hiển thị items với màu sắc
        const itemsHtml = order.items.map(item => `
            <div class="flex justify-between py-2 text-sm">
                <div class="flex items-center">
                    ${item.color ? `<span class="color-dot" style="background-color: ${getColorHex(item.color)}"></span>` : ''}
                    <span>${item.name}</span>
                    ${item.color ? `<span class="ml-2 text-pink-500">(${item.color})</span>` : ''}
                </div>
                <span>${(item.price * (item.quantity || 1)).toLocaleString('vi-VN')} ₫</span>
            </div>
        `).join('');

        html += `
            <div class="order-card bg-white rounded-3xl p-7 shadow">
                <div class="flex justify-between mb-6">
                    <div>
                        <p class="font-semibold text-xl">Đơn #${order.id}</p>
                        <p class="text-xs text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-5 py-1 text-xs rounded-full ${order.status === 'delivered' ? 'bg-green-100 text-green-700' : 
                            order.status === 'shipping' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${order.status || 'Chờ xử lý'}
                        </span>
                    </div>
                </div>

                <div class="border-t border-b py-5 mb-6">
                    ${itemsHtml}
                </div>

                <div class="flex justify-between items-center text-sm">
                    <div>
                        <strong>Khách hàng:</strong> ${order.users?.name || order.customer_name || 'Không rõ'}<br>
                        <strong>SĐT:</strong> ${order.users?.phone || order.customer_phone || 'Không rõ'}
                    </div>
                    <div class="font-bold text-2xl text-[#f06292]">
                        ${Number(order.total).toLocaleString('vi-VN')} ₫
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <button onclick="viewInvoice('${order.id}')" 
                            class="flex-1 bg-[#f06292] text-white py-3.5 rounded-2xl font-medium hover:bg-[#ec407a]">
                        📄 Xem hóa đơn
                    </button>
                    <button onclick="printInvoiceDirect('${order.id}')" 
                            class="flex-1 border border-[#f06292] text-[#f06292] py-3.5 rounded-2xl font-medium hover:bg-pink-50">
                        🖨️ In PDF
                    </button>
                </div>

                <div class="mt-6">
                    <select onchange="updateOrderStatus('${order.id}', this.value)" 
                            class="w-full p-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#f06292]">
                        <option value="pending" ${order.status==='pending'?'selected':''}>Chờ xử lý</option>
                        <option value="confirmed" ${order.status==='confirmed'?'selected':''}>Đã xác nhận</option>
                        <option value="preparing" ${order.status==='preparing'?'selected':''}>Đang chuẩn bị</option>
                        <option value="shipping" ${order.status==='shipping'?'selected':''}>Đang giao hàng</option>
                        <option value="delivered" ${order.status==='delivered'?'selected':''}>Đã giao thành công</option>
                    </select>
                </div>
            </div>`;
    });

    container.innerHTML = html || '<p class="text-center py-12 text-gray-500">Chưa có đơn hàng nào</p>';
}

// ==================== XEM HÓA ĐƠN ====================
async function viewInvoice(orderId) {
    const { data: order, error } = await supabaseClient
        .from('orders')
        .select(`*, users(name, phone)`)
        .eq('id', orderId)
        .single();

    if (error || !order) {
        alert("Không tìm thấy đơn hàng!");
        return;
    }

    currentOrderForPrint = order;

    const pay = paymentConfig[order.payment_method] || { text: 'Không rõ' };

    let itemsHTML = order.items.map(item => `
        <tr class="border-b">
            <td class="py-4">
                ${item.name}
                ${item.color ? `<span class="ml-2 text-pink-500">(${item.color})</span>` : ''}
            </td>
            <td class="py-4 text-center">${item.quantity || 1}</td>
            <td class="py-4 text-right">${Number(item.price).toLocaleString('vi-VN')} ₫</td>
            <td class="py-4 text-right font-semibold">${(item.price * (item.quantity || 1)).toLocaleString('vi-VN')} ₫</td>
        </tr>
    `).join('');

    const modalContent = `
        <div class="max-w-3xl mx-auto p-8">
            <div class="flex justify-between mb-10">
                <div>
                    <h1 class="heading-font text-4xl text-[#f06292]">THẾ GIỚI KIẾN TRÚC</h1>
                    <p class="text-sm text-gray-500">85 Trần Thị Hè, Quận 12, TP.HCM</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-[#f06292]">HÓA ĐƠN</p>
                    <p class="text-sm">Đơn #${order.id}</p>
                    <p class="text-sm text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-10 mb-10">
                <div>
                    <p class="font-medium">Khách hàng</p>
                    <p>${order.users?.name || order.customer_name}</p>
                    <p>${order.users?.phone || order.customer_phone}</p>
                </div>
                <div class="text-right">
                    <p class="font-medium">Phương thức thanh toán</p>
                    <p>${pay.text}</p>
                </div>
            </div>

            <table class="w-full text-sm mb-10">
                <thead>
                    <tr class="border-b-2 border-gray-800 text-left">
                        <th class="py-3 font-medium">Sản phẩm</th>
                        <th class="py-3 text-center font-medium">SL</th>
                        <th class="py-3 text-right font-medium">Đơn giá</th>
                        <th class="py-3 text-right font-medium">Thành tiền</th>
                    </tr>
                </thead>
                <tbody>${itemsHTML}</tbody>
            </table>

            <div class="flex justify-end text-2xl font-bold">
                Tổng cộng: <span class="ml-8 text-[#f06292]">${Number(order.total).toLocaleString('vi-VN')} ₫</span>
            </div>
        </div>
    `;

    document.getElementById('invoiceContent').innerHTML = modalContent;
    document.getElementById('invoiceModal').classList.remove('hidden');
}

function closeInvoiceModal() {
    document.getElementById('invoiceModal').classList.add('hidden');
}

function printInvoice() {
    window.print();
}

function printInvoiceDirect(orderId) {
    viewInvoice(orderId);
    setTimeout(() => window.print(), 800);
}

// ==================== CẬP NHẬT TRẠNG THÁI ====================
async function updateOrderStatus(orderId, status) {
    const { error } = await supabaseClient
        .from('orders')
        .update({ status: status })
        .eq('id', orderId);

    if (error) {
        alert("Lỗi cập nhật trạng thái!");
    } else {
        alert("✅ Đã cập nhật trạng thái đơn hàng!");
        loadOrders();
    }
}

window.onload = loadOrders;
</script>
</body>
</html>
