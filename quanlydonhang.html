<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý đơn hàng - Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        /* Tối ưu mobile */
        @layer base {
            html { font-size: 16px; }
            button, select {
                min-height: 52px;
            }
        }

        #invoiceModal { animation: fadeIn 0.3s ease; }
        
        @media print {
            body * { visibility: hidden; }
            #invoiceModal, #invoiceModal * { visibility: visible; }
            #invoiceModal { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="heading-font text-4xl font-bold">📋 Quản lý đơn hàng</h1>
        <a href="admin.html" class="bg-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-gray-100 text-sm md:text-base">
            ← Quay lại Admin
        </a>
    </div>

    <div id="orderList" class="space-y-6"></div>
</div>

<!-- MODAL XEM HÓA ĐƠN -->
<div id="invoiceModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
    <div class="bg-white rounded-3xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-auto">
        <div class="sticky top-0 bg-white border-b px-8 py-4 flex justify-between items-center z-10">
            <h2 class="heading-font text-3xl text-[#f06292]">HÓA ĐƠN BÁN HÀNG</h2>
            <div class="flex gap-3">
                <button onclick="printInvoice()" 
                        class="no-print flex items-center gap-2 bg-[#f06292] text-white px-6 py-2 rounded-2xl hover:bg-[#ec407a]">
                    <i class="fa-solid fa-print"></i> In hóa đơn
                </button>
                <button onclick="closeInvoiceModal()" 
                        class="no-print text-gray-500 hover:text-gray-700">
                    ✕ Đóng
                </button>
            </div>
        </div>

        <div id="invoiceContent" class="p-8"></div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const paymentConfig = {
    cod:      { icon: 'fa-hand-holding-dollar', text: 'Thanh toán khi nhận hàng' },
    bank:     { icon: 'fa-building-columns',    text: 'Chuyển khoản ACB' },
    zalopay:  { icon: 'fa-qrcode',              text: 'ZaloPay' },
    momo:     { icon: 'fa-qrcode',              text: 'MoMo' }
};

let currentOrderForPrint = null;

// ==================== TẢI DANH SÁCH ĐƠN HÀNG ====================
async function loadOrders() {
    const container = document.getElementById('orderList');
    container.innerHTML = '<p class="text-center py-12 text-gray-500">Đang tải đơn hàng...</p>';

    const { data, error } = await supabaseClient
        .from('orders')
        .select(`*, users(name, phone)`)
        .order('created_at', { ascending: false });

    if (error || !data) {
        container.innerHTML = `<p class="text-red-500 text-center py-12">Lỗi tải dữ liệu: ${error?.message || ''}</p>`;
        return;
    }

    let html = '';
    data.forEach(order => {
        const pay = paymentConfig[order.payment_method] || { icon: 'fa-question', text: order.payment_method || 'Không rõ' };

        html += `
            <div class="bg-white rounded-3xl p-6 shadow">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="font-semibold text-lg">Đơn #${order.id}</p>
                        <p class="text-xs text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-5 py-1 text-xs rounded-full ${order.status === 'delivered' ? 'bg-green-100 text-green-700' : order.status === 'shipping' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${order.status}
                        </span>
                        <p class="mt-2 text-sm flex items-center justify-end gap-1">
                            <i class="fa-solid ${pay.icon}"></i> ${pay.text}
                        </p>
                    </div>
                </div>

                <div class="text-sm space-y-2 mb-6">
                    <p><strong>Khách hàng:</strong> ${order.users?.name || order.customer_name || 'Không rõ'}</p>
                    <p><strong>SĐT:</strong> ${order.users?.phone || order.customer_phone || 'Không rõ'}</p>
                    <p><strong>Địa chỉ:</strong> ${order.customer_address}</p>
                </div>

                <div class="flex gap-3">
                    <button onclick="viewInvoice('${order.id}')" 
                            class="flex-1 bg-[#f06292] text-white py-3 rounded-2xl font-medium hover:bg-[#ec407a]">
                        📄 Xem hóa đơn
                    </button>
                    <button onclick="printInvoiceDirect('${order.id}')" 
                            class="flex-1 border border-[#f06292] text-[#f06292] py-3 rounded-2xl font-medium hover:bg-pink-50">
                        🖨️ In hóa đơn
                    </button>
                </div>

                <div class="mt-6">
                    <select onchange="updateOrderStatus('${order.id}', this.value)" class="w-full p-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#f06292]">
                        <option value="pending" ${order.status==='pending'?'selected':''}>Chờ xử lý</option>
                        <option value="confirmed" ${order.status==='confirmed'?'selected':''}>Đã nhận</option>
                        <option value="preparing" ${order.status==='preparing'?'selected':''}>Đang chuẩn bị</option>
                        <option value="shipping" ${order.status==='shipping'?'selected':''}>Đang giao hàng</option>
                        <option value="delivered" ${order.status==='delivered'?'selected':''}>Đã giao thành công</option>
                    </select>
                </div>
            </div>`;
    });

    container.innerHTML = html || '<p class="text-center py-12 text-gray-500">Chưa có đơn hàng nào</p>';
}

// ==================== XEM HÓA ĐƠN ====================
async function viewInvoice(orderId) {
    const { data: order, error } = await supabaseClient
        .from('orders')
        .select(`*, users(name, phone)`)
        .eq('id', orderId)
        .single();

    if (error || !order) {
        alert("Không tìm thấy đơn hàng!");
        return;
    }

    currentOrderForPrint = order;

    const pay = paymentConfig[order.payment_method] || { icon: 'fa-question', text: order.payment_method || 'Không rõ' };

    let itemsHTML = order.items.map(item => `
        <tr class="border-b">
            <td class="py-3">${item.customName || item.name}</td>
            <td class="py-3 text-center">${item.quantity || 1}</td>
            <td class="py-3 text-right">${Number(item.price).toLocaleString('vi-VN')} ₫</td>
            <td class="py-3 text-right font-medium">${(item.price * (item.quantity || 1)).toLocaleString('vi-VN')} ₫</td>
        </tr>
    `).join('');

    const modalContent = `
        <div class="max-w-3xl mx-auto bg-white p-8">
            <div class="flex justify-between mb-8">
                <div>
                    <h1 class="heading-font text-3xl">THẾ GIỚI KIẾN TRÚC</h1>
                    <p class="text-sm text-gray-500">85 Trần Thị Hè, Quận 12, TP.HCM</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-[#f06292]">HÓA ĐƠN</p>
                    <p class="text-sm">Đơn #${order.id}</p>
                    <p class="text-sm text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8 mb-8">
                <div>
                    <p class="font-medium">Khách hàng</p>
                    <p>${order.users?.name || order.customer_name}</p>
                    <p>${order.users?.phone || order.customer_phone}</p>
                    <p class="text-sm text-gray-500">${order.customer_address}</p>
                </div>
                <div class="text-right">
                    <p class="font-medium">Phương thức thanh toán</p>
                    <p><i class="fa-solid ${pay.icon}"></i> ${pay.text}</p>
                </div>
            </div>

            <table class="w-full text-sm mb-8">
                <thead>
                    <tr class="border-b-2 border-gray-800">
                        <th class="text-left py-3 font-medium">Sản phẩm</th>
                        <th class="text-center py-3 font-medium">SL</th>
                        <th class="text-right py-3 font-medium">Đơn giá</th>
                        <th class="text-right py-3 font-medium">Thành tiền</th>
                    </tr>
                </thead>
                <tbody>${itemsHTML}</tbody>
            </table>

            <div class="flex justify-end text-2xl font-semibold">
                Tổng cộng: <span class="ml-6 text-[#f06292]">${Number(order.total).toLocaleString('vi-VN')} ₫</span>
            </div>

            <div class="text-center text-gray-500 text-xs mt-16">
                Cảm ơn quý khách đã tin tưởng THẾ GIỚI KIẾN TRÚC!<br>
                Hóa đơn này được xuất tự động từ hệ thống.
            </div>
        </div>
    `;

    document.getElementById('invoiceContent').innerHTML = modalContent;
    document.getElementById('invoiceModal').classList.remove('hidden');
    document.getElementById('invoiceModal').classList.add('flex');
}

function closeInvoiceModal() {
    const modal = document.getElementById('invoiceModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function printInvoice() {
    window.print();
}

function printInvoiceDirect(orderId) {
    viewInvoice(orderId);
    setTimeout(() => window.print(), 800);
}

// ==================== CẬP NHẬT TRẠNG THÁI ====================
async function updateOrderStatus(orderId, status) {
    const { error } = await supabaseClient
        .from('orders')
        .update({ status })
        .eq('id', orderId);

    if (error) {
        alert("Lỗi cập nhật trạng thái!");
    } else {
        alert("✅ Đã cập nhật trạng thái đơn hàng!");
        loadOrders();
    }
}

window.onload = loadOrders;
</script>
</body>
</html>
