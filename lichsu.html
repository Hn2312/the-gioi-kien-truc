<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lịch sử đặt hàng - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        /* Tối ưu mobile */
        @layer base {
            html { font-size: 16px; }
            button { min-height: 52px; }
        }

        #invoiceModal { animation: fadeIn 0.3s ease; }
        
        @media print {
            body * { visibility: hidden; }
            #invoiceModal, #invoiceModal * { visibility: visible; }
            #invoiceModal { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            .no-print { display: none !important; }
        }

        /* Toast Notification */
        .toast-notification {
            animation: toastSlideIn 0.4s ease forwards;
        }
        @keyframes toastSlideIn {
            from { transform: translateY(80px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#fce7f3] min-h-screen">

    <nav class="bg-[#f06292] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='index.html'" class="heading-font text-2xl md:text-3xl font-semibold cursor-pointer">
                THẾ GIỚI KIẾN TRÚC
            </h1>
            <a href="sanpham.html" class="flex items-center gap-2 text-white hover:text-pink-100">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Quay lại cửa hàng</span>
            </a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="heading-font text-4xl font-bold text-[#f06292]">Lịch sử đặt hàng</h1>
            <button onclick="loadOrderHistory()" 
                    class="flex items-center gap-2 bg-white text-[#f06292] px-6 py-3 rounded-3xl font-medium hover:bg-pink-50 shadow">
                <i class="fa-solid fa-rotate"></i>
                Làm mới ngay
            </button>
        </div>
        <div id="orderHistory" class="space-y-6"></div>
    </div>

    <!-- MODAL XEM HÓA ĐƠN -->
    <div id="invoiceModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
        <div class="bg-white max-w-2xl w-full rounded-3xl shadow-2xl overflow-hidden">
            <div class="px-8 py-6 border-b flex justify-between items-center">
                <h2 class="heading-font text-3xl text-[#f06292]">HÓA ĐƠN</h2>
                <button onclick="closeInvoiceModal()" class="text-gray-500 hover:text-gray-700 text-3xl no-print">×</button>
            </div>
            <div id="invoiceContent" class="p-8"></div>
            <div class="px-8 py-6 border-t flex justify-end gap-3 no-print">
                <button onclick="closeInvoiceModal()" class="px-8 py-4 border border-gray-300 rounded-2xl font-medium">Đóng</button>
                <button onclick="printInvoice()" class="px-8 py-4 bg-[#f06292] text-white rounded-2xl font-semibold flex items-center gap-2 hover:bg-[#ec407a]">
                    <i class="fa-solid fa-print"></i> IN HÓA ĐƠN (PDF)
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 max-w-xs"></div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'; 
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== REALTIME CHANNEL ====================
const channel = supabaseClient.channel('new-purchase');

channel
  .on('broadcast', { event: 'new-order' }, (payload) => {
      const data = payload.payload || payload;
      const { customerName, productName, productImage } = data;
      if (customerName && productName) {
          showPurchaseToast(customerName, productName, productImage);
      }
  })
  .subscribe();

// ==================== TOAST FUNCTION ====================
function showPurchaseToast(customerName, productName, productImage) {
    const toastHTML = `
        <div class="toast-notification bg-white shadow-2xl border border-pink-200 rounded-3xl p-4 flex items-center gap-4 w-80">
            <img src="${productImage}" class="w-14 h-14 object-cover rounded-2xl flex-shrink-0" alt="${productName}">
            <div class="flex-1">
                <p class="font-medium text-xs text-gray-500">Có người vừa mua</p>
                <p class="font-semibold leading-tight">${customerName} vừa mua <span class="text-[#f06292]">${productName}</span></p>
            </div>
        </div>`;

    const container = document.getElementById('toastContainer');
    container.insertAdjacentHTML('beforeend', toastHTML);

    setTimeout(() => {
        if (container.children.length > 0) container.children[0].remove();
    }, 6000);
}

// ==================== CÁC HÀM CÒN LẠI ====================
const paymentConfig = {
    cod:      { icon: 'fa-hand-holding-dollar', text: 'COD (Thanh toán khi nhận hàng)' },
    bank:     { icon: 'fa-building-columns',    text: 'Chuyển khoản ACB' },
    zalopay:  { icon: 'fa-qrcode',              text: 'ZaloPay' },
    momo:     { icon: 'fa-qrcode',              text: 'MoMo' }
};

const statusConfig = {
    pending:    { text: 'Chờ xử lý',      color: 'bg-yellow-100 text-yellow-700' },
    confirmed:  { text: 'Đã xác nhận',    color: 'bg-blue-100 text-blue-700' },
    preparing:  { text: 'Đang chuẩn bị',  color: 'bg-orange-100 text-orange-700' },
    shipping:   { text: 'Đang giao hàng', color: 'bg-blue-100 text-blue-700' },
    delivered:  { text: 'Đã giao thành công', color: 'bg-green-100 text-green-700' }
};

let allOrders = [];
let lastOrderCount = 0;

async function loadOrderHistory() {
    const container = document.getElementById('orderHistory');
    container.innerHTML = '<p class="text-center py-20 text-gray-500">Đang tải lịch sử đơn hàng...</p>';

    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || !currentUser.id) {
        container.innerHTML = `
            <div class="text-center py-20 bg-white rounded-3xl p-10">
                <p class="text-red-500 text-lg">Bạn chưa đăng nhập.</p>
                <a href="auth.html" class="mt-6 inline-block bg-[#f06292] text-white px-10 py-4 rounded-3xl">Đăng nhập ngay</a>
            </div>`;
        return;
    }

    const { data: orders, error } = await supabaseClient
        .from('orders')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Lỗi Supabase:", error);
        container.innerHTML = `<p class="text-red-500 text-center py-10">Lỗi tải dữ liệu: ${error.message}</p>`;
        return;
    }

    if (!orders || orders.length === 0) {
        container.innerHTML = `
            <div class="text-center py-20 bg-white rounded-3xl p-10">
                <i class="fa-solid fa-receipt text-6xl text-gray-300 mb-4"></i>
                <p class="text-gray-500">Bạn chưa có đơn hàng nào.</p>
            </div>`;
        return;
    }

    allOrders = orders;

    if (orders.length !== lastOrderCount) {
        showToast("Có cập nhật mới từ đơn hàng của bạn!");
    }
    lastOrderCount = orders.length;

    let html = '';
    orders.forEach(order => {
        const pay = paymentConfig[order.payment_method] || { icon: 'fa-question', text: order.payment_method || 'Không rõ' };
        const status = statusConfig[order.status] || { text: order.status, color: 'bg-gray-100 text-gray-700' };

        const itemsHtml = order.items.map(item => `
            <div class="flex justify-between text-sm py-1">
                <span>${item.customName || item.name} × ${item.quantity || 1}</span>
                <span>${(item.price * (item.quantity || 1)).toLocaleString('vi-VN')} ₫</span>
            </div>
        `).join('');

        html += `
            <div class="bg-white rounded-3xl p-6 shadow-xl" data-order-id="${order.id}">
                <div class="flex justify-between mb-4">
                    <div>
                        <p class="font-semibold text-lg">Đơn #${order.id}</p>
                        <p class="text-xs text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-5 py-1 text-xs rounded-full ${status.color}">${status.text}</span>
                        <p class="mt-2 text-sm flex items-center justify-end gap-2">
                            <i class="fa-solid ${pay.icon}"></i> ${pay.text}
                        </p>
                    </div>
                </div>
                <div class="my-4 text-sm">${itemsHtml}</div>
                <div class="flex justify-between items-center pt-4 border-t">
                    <p class="font-bold text-[#f06292] text-2xl">${order.total.toLocaleString('vi-VN')} ₫</p>
                    <div class="flex gap-3">
                        <button onclick="viewInvoiceById('${order.id}')" class="px-6 py-3 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-2xl flex items-center gap-2">
                            <i class="fa-solid fa-eye"></i> Xem hóa đơn
                        </button>
                        <button onclick="printInvoiceDirectById('${order.id}')" class="px-6 py-3 text-sm bg-[#f06292] hover:bg-[#ec407a] text-white rounded-2xl flex items-center gap-2">
                            <i class="fa-solid fa-print"></i> In PDF
                        </button>
                    </div>
                </div>
            </div>`;
    });

    container.innerHTML = html;
}

function viewInvoiceById(id) {
    const order = allOrders.find(o => String(o.id) === String(id));
    if (!order) {
        alert("Không tìm thấy đơn hàng! Vui lòng tải lại trang.");
        return;
    }

    const modal = document.getElementById('invoiceModal');
    const content = document.getElementById('invoiceContent');
    const pay = paymentConfig[order.payment_method] || { text: order.payment_method || 'Không rõ' };

    let itemsHTML = order.items.map(item => `
        <tr class="border-b">
            <td class="py-3">${item.customName || item.name}</td>
            <td class="py-3 text-center">${item.quantity || 1}</td>
            <td class="py-3 text-right">${item.price.toLocaleString('vi-VN')} ₫</td>
            <td class="py-3 text-right font-medium">${(item.price * (item.quantity || 1)).toLocaleString('vi-VN')} ₫</td>
        </tr>
    `).join('');

    content.innerHTML = `
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="heading-font text-4xl text-[#f06292]">THẾ GIỚI KIẾN TRÚC</h1>
                    <p class="text-sm text-gray-500">Hóa đơn bán hàng</p>
                </div>
                <div class="text-right">
                    <p class="font-semibold">Đơn hàng #${order.id}</p>
                    <p class="text-sm text-gray-500">${new Date(order.created_at).toLocaleString('vi-VN')}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8 mb-8 text-sm">
                <div>
                    <p class="font-medium mb-1">Khách hàng:</p>
                    <p>${order.customer_name}</p>
                    <p>${order.customer_phone}</p>
                    <p class="text-gray-600">${order.customer_address || ''}</p>
                </div>
                <div class="text-right">
                    <p class="font-medium mb-1">Phương thức thanh toán:</p>
                    <p class="flex items-center justify-end gap-2">
                        <i class="fa-solid ${pay.icon || 'fa-question'}"></i> ${pay.text}
                    </p>
                </div>
            </div>

            <table class="w-full text-sm mb-8">
                <thead>
                    <tr class="border-b-2 border-gray-800">
                        <th class="text-left py-3 font-medium">Sản phẩm</th>
                        <th class="text-center py-3 font-medium">SL</th>
                        <th class="text-right py-3 font-medium">Đơn giá</th>
                        <th class="text-right py-3 font-medium">Thành tiền</th>
                    </tr>
                </thead>
                <tbody>${itemsHTML}</tbody>
            </table>

            <div class="flex justify-end text-xl font-semibold">
                Tổng cộng: <span class="ml-6 text-[#f06292]">${order.total.toLocaleString('vi-VN')} ₫</span>
            </div>

            <div class="text-center text-gray-500 text-xs mt-12">
                Cảm ơn quý khách đã tin tưởng THẾ GIỚI KIẾN TRÚC!<br>
                Hóa đơn này được xuất tự động từ hệ thống.
            </div>
        </div>
    `;

    modal.classList.remove('hidden');
    modal.classList.add('flex');
}

function closeInvoiceModal() {
    const modal = document.getElementById('invoiceModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function printInvoice() {
    window.print();
}

function printInvoiceDirectById(id) {
    viewInvoiceById(id);
    setTimeout(() => window.print(), 600);
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-6 right-6 bg-[#f06292] text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3';
    toast.innerHTML = `
        <i class="fa-solid fa-circle-check"></i>
        <span class="font-medium">${message}</span>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// Tự động refresh mỗi 15 giây
setInterval(() => {
    loadOrderHistory();
}, 15000);

// Khởi tạo
window.onload = loadOrderHistory;
</script>
</body>
</html>
