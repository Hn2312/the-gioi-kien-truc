<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chi tiết sản phẩm - THẾ GIỚI KIẾN TRÚC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        .heading-font { font-family: 'Playfair Display', sans-serif; }
        
        .main-image {
            transition: all 0.4s ease;
        }
        .thumbnail {
            transition: all 0.3s ease;
        }
        .thumbnail.active {
            border: 3px solid #f06292;
            transform: scale(1.05);
        }

        @layer base {
            html { font-size: 16px; }
            input, button {
                min-height: 52px;
            }
        }

        .price-option {
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .price-option.active {
            background-color: #f06292 !important;
            color: white !important;
            border-color: #f06292 !important;
            box-shadow: 0 10px 15px -3px rgb(240 98 146);
            transform: scale(1.05);
        }

        /* ===== CHỈNH TÊN & GIÁ ===== */
        .product-title {
            font-size: 1.65rem;        /* Laptop */
            line-height: 1.25;
        }
        
        .product-price {
            font-size: 2.1rem;         /* To hơn rất rõ trên cả mobile & laptop */
            font-weight: 700;
            color: #e11d48;            /* Màu đỏ hồng nổi bật */
            line-height: 1.1;
        }

        /* Mobile tối ưu thêm */
        @media (max-width: 640px) {
            .product-title {
                font-size: 1.45rem;    /* Tên nhỏ gọn hơn trên điện thoại */
            }
            .product-price {
                font-size: 2.25rem;    /* Giá càng to hơn trên mobile */
            }
        }
    </style>
</head>
<body class="bg-[#fce7f3]">

    <!-- NAVBAR -->
    <nav class="bg-[#f06292] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <h1 onclick="window.location.href='index.html'" class="heading-font text-2xl md:text-3xl font-semibold cursor-pointer">
                THẾ GIỚI KIẾN TRÚC
            </h1>
            <div class="flex items-center gap-6">
                <a href="sanpham.html" class="hover:text-pink-100 flex items-center gap-2">
                    ← Quay lại Sản phẩm
                </a>
                <button onclick="goToCart()" class="relative text-white hover:text-pink-100">
                    <i class="fa-solid fa-shopping-cart text-2xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-white text-[#f06292] text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 md:py-12">
        <div id="productDetail" class="bg-white rounded-3xl shadow-2xl overflow-hidden"></div>
    </div>

    <!-- MODAL XEM MẪU THỰC TẾ -->
    <div id="realModal" class="hidden fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-5xl w-full max-h-[95vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-2xl font-semibold">📸 Mẫu thực tế lắp đặt</h3>
                <button onclick="closeRealModal()" class="text-4xl leading-none text-gray-400 hover:text-gray-700">×</button>
            </div>
            <div class="flex-1 p-6 flex items-center justify-center bg-black">
                <img id="modalMainImage" class="max-h-[65vh] max-w-full rounded-2xl shadow-2xl object-contain" alt="">
            </div>
            <div class="px-6 pb-6">
                <div class="flex gap-4 overflow-x-auto pb-4 snap-x" id="modalThumbnails"></div>
            </div>
        </div>
    </div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://bmtoaaajobrqgmjidtgf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GmghtWzyLip_Jc-yge9K8Q_7gKMGoIO'; 
const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let currentProduct = null;
let currentImages = [];
let currentRealImages = [];
let currentIndex = 0;
let selectedPrice = 0;
let isFurniture = false;
let isAluminumGlass = false;

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

function updateCartCount() {
    const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.getElementById('cartCount');
    badge.textContent = count;
    badge.classList.toggle('hidden', count === 0);
}

function goToCart() {
    window.location.href = 'giohang.html';
}

async function loadProductDetail() {
    if (!productId) {
        showError("Không tìm thấy sản phẩm");
        return;
    }

    const { data: p, error } = await client.from('products').select('*').eq('id', productId).single();
    if (error || !p) {
        showError("Sản phẩm không tồn tại hoặc đã bị xóa");
        return;
    }

    currentProduct = p;
    currentImages = Array.isArray(p.images) && p.images.length > 0 ? p.images : [p.image || 'https://via.placeholder.com/800x800?text=No+Image'];
    currentRealImages = Array.isArray(p.real_images) && p.real_images.length > 0 ? p.real_images : [];
    currentIndex = 0;

    isFurniture = p.category && p.category.toLowerCase().includes('nội thất');
    isAluminumGlass = p.category && p.category.toLowerCase().includes('nhôm kính');
    selectedPrice = Number(p.price);

    let priceHTML = '';
    if (p.price_to && p.price_to > p.price) {
        priceHTML = `<span class="product-price">Từ ${Number(p.price).toLocaleString('vi-VN')} - ${Number(p.price_to).toLocaleString('vi-VN')} ₫</span>`;
    } else {
        priceHTML = `<span class="product-price">${Number(p.price).toLocaleString('vi-VN')} ₫</span>`;
    }

    const html = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 p-6 md:p-10">
            <!-- CỘT TRÁI: ẢNH -->
            <div class="space-y-6">
                <div>
                    <img id="mainImage" src="${currentImages[0]}" class="w-full rounded-3xl shadow-xl main-image" alt="${p.name}">
                    <div class="flex gap-3 mt-6 overflow-x-auto pb-3 snap-x" id="thumbnails">
                        ${currentImages.map((img, idx) => `
                            <img onclick="changeMainImage(${idx})" src="${img}" class="thumbnail w-20 h-20 object-cover rounded-2xl cursor-pointer flex-shrink-0 snap-center ${idx === 0 ? 'active' : ''}">
                        `).join('')}
                    </div>
                    ${currentImages.length > 1 ? `
                    <div class="flex justify-between mt-4">
                        <button onclick="prevImage()" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 rounded-3xl text-xl"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="nextImage()" class="px-6 py-4 bg-gray-100 hover:bg-gray-200 rounded-3xl text-xl"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>` : ''}
                </div>

                <div class="border border-gray-200 rounded-3xl p-6">
                    <h3 class="font-semibold text-lg mb-3">Mô tả sản phẩm</h3>
                    <p class="text-gray-600 leading-relaxed whitespace-pre-line">${p.desc || 'Đang cập nhật mô tả chi tiết...'}</p>
                </div>
            </div>

            <!-- CỘT PHẢI -->
            <div class="space-y-8">
                <div>
                    <h1 class="heading-font product-title font-bold text-gray-800">${p.name}</h1>
                    <div class="mt-5">${priceHTML}</div>
                    <p class="text-sm text-gray-500 mt-2">${p.category || ''}</p>
                </div>

                ${!isFurniture ? `
                <div id="priceSelectionSection"></div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-4">Kích thước (m)</label>
                    ${isAluminumGlass ? `
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <input type="number" step="0.01" id="width" placeholder="Rộng (m)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-[#f06292] focus:outline-none text-center text-lg" oninput="calculatePrice()">
                            <p class="text-xs text-center text-gray-500 mt-1">Rộng (m)</p>
                        </div>
                        <div>
                            <input type="number" step="0.01" id="height" placeholder="Cao (m)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-[#f06292] focus:outline-none text-center text-lg" oninput="calculatePrice()">
                            <p class="text-xs text-center text-gray-500 mt-1">Cao (m)</p>
                        </div>
                    </div>` : `
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <input type="number" step="0.01" id="length" placeholder="Dài (m)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-[#f06292] focus:outline-none text-center text-lg" oninput="calculatePrice()">
                            <p class="text-xs text-center text-gray-500 mt-1">Dài (m)</p>
                        </div>
                        <div>
                            <input type="number" step="0.01" id="width" placeholder="Rộng (m)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-[#f06292] focus:outline-none text-center text-lg" oninput="calculatePrice()">
                            <p class="text-xs text-center text-gray-500 mt-1">Rộng (m)</p>
                        </div>
                        <div>
                            <input type="number" step="0.01" id="height" placeholder="Cao (m)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-[#f06292] focus:outline-none text-center text-lg" oninput="calculatePrice()">
                            <p class="text-xs text-center text-gray-500 mt-1">Cao (m)</p>
                        </div>
                    </div>`}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Chọn màu sắc</label>
                    <div class="flex flex-wrap gap-3" id="colorOptions"></div>
                </div>

                <div class="bg-[#fce7f3] p-6 rounded-3xl">
                    <div class="flex justify-between items-baseline">
                        <span class="font-semibold text-lg">Giá ước tính:</span>
                        <span id="estimatedPrice" class="text-3xl font-bold text-[#e11d48]">0 ₫</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">Giá có thể thay đổi tùy chất liệu và thi công thực tế</p>
                </div>
                ` : ''}

                <button onclick="showRealModal()" class="w-full bg-white border-2 border-[#f06292] text-[#f06292] hover:bg-[#fce7f3] py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
                    <i class="fa-solid fa-camera"></i> 📸 Xem mẫu thực tế lắp đặt
                </button>

                ${isFurniture ? `
                <div class="mt-4">
                    <a href="https://zalo.me/0987042718" target="_blank" 
                       class="block w-full text-center bg-white border-2 border-[#f06292] text-[#f06292] hover:bg-[#fce7f3] py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
                        <i class="fa-solid fa-comments"></i> Đặt thiết kế riêng - Nhấp vào đây
                    </a>
                    <p class="text-center text-sm text-gray-500 mt-3">
                        Hoặc gọi ngay: <a href="tel:0987042718" class="font-medium text-[#f06292]">0987 042 718</a>
                    </p>
                </div>` : ''}

                <div class="flex gap-4">
                    <button onclick="addCustomToCart()" class="flex-1 bg-[#f06292] hover:bg-[#ec407a] text-white py-5 rounded-3xl font-semibold text-lg">🛒 Thêm vào giỏ hàng</button>
                    <button onclick="window.history.back()" class="flex-1 border border-gray-300 hover:bg-gray-50 py-5 rounded-3xl font-semibold text-lg">← Quay lại</button>
                </div>
            </div>
        </div>
    `;

    document.getElementById('productDetail').innerHTML = html;

    if (!isFurniture && p.price_to && p.price_to > p.price) {
        renderPriceOptions();
    }

    if (!isFurniture) {
        renderColorOptions();
        calculatePrice();
    }

    updateCartCount();
}

function renderPriceOptions() {
    const section = document.getElementById('priceSelectionSection');
    let html = `<label class="block text-sm font-medium text-gray-700 mb-3">Chọn mức giá</label><div class="flex flex-wrap gap-3">`;
    const start = Number(currentProduct.price);
    const end = Number(currentProduct.price_to);
    const step = 100000;

    for (let price = start; price <= end; price += step) {
        const active = (price === selectedPrice) ? 'active' : '';
        html += `<button onclick="selectPrice(${price})" class="price-option px-6 py-3 border-2 border-gray-300 rounded-3xl text-base font-medium ${active}">${price.toLocaleString('vi-VN')} ₫</button>`;
    }
    html += `</div>`;
    section.innerHTML = html;
}

function selectPrice(price) {
    selectedPrice = price;
    renderPriceOptions();
    calculatePrice();
}

function changeMainImage(index) {
    currentIndex = index;
    document.getElementById('mainImage').src = currentImages[index];
    document.querySelectorAll('.thumbnail').forEach((el, i) => el.classList.toggle('active', i === index));
}

function prevImage() {
    let newIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    changeMainImage(newIndex);
}

function nextImage() {
    let newIndex = (currentIndex + 1) % currentImages.length;
    changeMainImage(newIndex);
}

const colors = [
    {name:"Trắng", value:"#f8fafc"},
    {name:"Gỗ óc chó", value:"#5c4033"},
    {name:"Xám", value:"#64748b"},
    {name:"Đen", value:"#1f2937"},
    {name:"Be", value:"#d2b48c"},
    {name:"Nâu gỗ", value:"#8d5524"}
];

let selectedColor = "#f8fafc";

function renderColorOptions() {
    const container = document.getElementById('colorOptions');
    container.innerHTML = colors.map(c => `
        <div onclick="selectColor(this, '${c.value}')" 
             class="color-option w-10 h-10 rounded-2xl cursor-pointer border-4 border-white shadow-md" 
             style="background-color: ${c.value}" 
             title="${c.name}"></div>
    `).join('');
    if (container.children[0]) container.children[0].classList.add('ring-4', 'ring-[#f06292]');
}

function selectColor(el, val) {
    document.querySelectorAll('.color-option').forEach(e => e.classList.remove('ring-4', 'ring-[#f06292]'));
    el.classList.add('ring-4', 'ring-[#f06292]');
    selectedColor = val;
}

function calculatePrice() {
    if (!currentProduct) return;

    let estimatedPrice = 0;

    if (isAluminumGlass) {
        const widthM = parseFloat(document.getElementById('width').value) || 0;
        const heightM = parseFloat(document.getElementById('height').value) || 0;
        const area = widthM * heightM;
        estimatedPrice = Math.round(area * selectedPrice);
    } 
    else if (!isFurniture) {
        const widthM = parseFloat(document.getElementById('width').value) || 0;
        const heightM = parseFloat(document.getElementById('height').value) || 0;
        const area = widthM * heightM;
        estimatedPrice = Math.round(area * selectedPrice);
    }

    document.getElementById('estimatedPrice').textContent = estimatedPrice.toLocaleString('vi-VN') + ' ₫';
}

function addCustomToCart() {
    if (!currentProduct) return;

    const item = {
        id: currentProduct.id,
        name: currentProduct.name,
        price: selectedPrice,
        image: currentImages[currentIndex],
        color: isFurniture ? '' : selectedColor,
        size: isFurniture ? 'Thiết kế riêng' : 'Theo yêu cầu',
        quantity: 1
    };

    cart.push(item);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert(`✅ Đã thêm "${currentProduct.name}" vào giỏ hàng!`);
}

function showRealModal() {
    const modal = document.getElementById('realModal');
    if (currentRealImages.length === 0) {
        alert("Chưa có ảnh thực tế lắp đặt cho sản phẩm này.");
        return;
    }
    modal.classList.remove('hidden');
    document.getElementById('modalMainImage').src = currentRealImages[0];
    const thumbContainer = document.getElementById('modalThumbnails');
    thumbContainer.innerHTML = currentRealImages.map((img, idx) => `
        <img onclick="modalChangeImage(${idx})" src="${img}" class="w-24 h-24 object-cover rounded-2xl cursor-pointer flex-shrink-0 snap-center ${idx === 0 ? 'ring-4 ring-[#f06292]' : ''}">
    `).join('');
}

function modalChangeImage(idx) {
    document.getElementById('modalMainImage').src = currentRealImages[idx];
    const thumbs = document.getElementById('modalThumbnails').children;
    Array.from(thumbs).forEach((t, i) => t.classList.toggle('ring-4', i === idx));
}

function closeRealModal() {
    document.getElementById('realModal').classList.add('hidden');
}

function showError(msg) {
    document.getElementById('productDetail').innerHTML = `
        <div class="p-16 text-center">
            <h2 class="text-3xl font-semibold text-red-500">${msg}</h2>
            <a href="sanpham.html" class="mt-8 inline-block bg-[#f06292] text-white px-10 py-4 rounded-3xl">Quay lại trang sản phẩm</a>
        </div>`;
}

// Khởi tạo
window.onload = () => {
    loadProductDetail();
    updateCartCount();
};
</script>
</body>
</html>
